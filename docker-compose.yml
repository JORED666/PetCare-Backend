services:
  # El Gateway se puede correr localmente con npm run dev:gateway
  # o se puede agregar aquí si se desea containerizar.
  gateway:
    build: .
    container_name: petcare-gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - AUTH_SERVICE_URL=http://auth:3001
      - CLIENTS_SERVICE_URL=http://clients:3002
      - PETS_SERVICE_URL=http://pets:3003
      - APPOINTMENTS_SERVICE_URL=http://appointments:3004
      - CORS_ORIGIN=http://localhost:3000
    networks:
      - petcare-network
    restart: unless-stopped

networks:
  petcare-network:
    driver: bridge
